<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎤 Multi-Language Translator</h1>
        <p class="subtitle">Translate between English, Zulu, Sotho, and Afrikaans</p>
        
        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('translate')">🎙️ Translate</button>
            <button class="tab-btn" onclick="switchTab('transcript')">📝 Transcript</button>
        </div>
        
        <!-- Translate Tab -->
        <div id="translateTab" class="tab-content active">
        
        <div style="margin-bottom: 30px;">
            <p style="color: #a0a0a0; font-size: 0.9rem; text-align: center; margin-bottom: 10px;">Translate to:</p>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="lang-btn active" onclick="setLanguage('zu', 'Zulu')">🇿🇦 Zulu</button>
                <button class="lang-btn" onclick="setLanguage('en', 'English')">🇬🇧 English</button>
                <button class="lang-btn" onclick="setLanguage('st', 'Sotho')">🇿🇦 Sotho</button>
                <button class="lang-btn" onclick="setLanguage('xh', 'Xhosa')">🇿🇦 Xhosa</button>
                <button class="lang-btn" onclick="setLanguage('af', 'Afrikaans')">🇿🇦 Afrikaans</button>
            </div>
        </div>
        
        <div class="record-section">
            <button id="recordBtn" onclick="toggleRecording()">🎙️</button>
            <p id="status">Click to start recording</p>
            <div class="loader" id="loader"></div>
        </div>
        
        <div class="result-box" id="resultBox">
            <div class="english-text">
                <p class="result-label">You said (English)</p>
                <p class="result-text" id="englishResult"></p>
            </div>
            <div class="zulu-text">
                <p class="result-label">Translation (<span id="langLabel">Zulu</span>)</p>
                <p class="result-text" id="zuluResult"></p>
            </div>
            <button id="playBtn" onclick="playAudio()">🔊 Play Translation</button>
        </div>
        
        <div class="text-input-section">
            <h3>Or type in English</h3>
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Type English text here...">
                <button id="translateBtn" onclick="translateText()">Translate</button>
            </div>
        </div>
        
        </div><!-- End Translate Tab -->
        
        <!-- Transcript Tab -->
        <div id="transcriptTab" class="tab-content">
            <div class="transcript-header">
                <h3>📜 Conversation History</h3>
                <button id="downloadBtn" onclick="downloadTranscript()" class="download-btn">⬇️ Download</button>
                <button id="clearBtn" onclick="clearTranscript()" class="clear-btn">🗑️ Clear</button>
            </div>
            <div id="transcriptList" class="transcript-list">
                <p class="empty-message">No translations yet. Start translating to see your history!</p>
            </div>
        </div>
        
    </div>
    
    <audio id="audioPlayer" style="display: none;"></audio>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
