<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎤 Multi-Language Translator</h1>
        <p class="subtitle">Speak naturally and translate to the language you choose</p>
        
        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('translate')">🎙️ Translate</button>
            <button class="tab-btn" onclick="switchTab('transcript')">📝 Transcript</button>
        </div>
        
        <!-- Translate Tab -->
        <div id="translateTab" class="tab-content active">
        
        <div class="language-controls">
            <div class="language-control">
                <p class="language-label">Translate to:</p>
                <select id="targetLanguageSelect" onchange="setTargetLanguage(this.value)">
                    <option value="zu" selected>🇿🇦 Zulu</option>
                    <option value="xh">🇿🇦 Xhosa</option>
                    <option value="st">🇿🇦 Sotho</option>
                    <option value="nso">🇿🇦 Sepedi</option>
                    <option value="tn">🇿🇦 Tswana</option>
                    <option value="ts">🇿🇦 Tsonga</option>
                </select>
            </div>
        </div>
        
        <div class="record-section">
            <button id="recordBtn" onclick="toggleRecording()">🎙️</button>
            <p id="status">Click to start recording</p>
            <div class="loader" id="loader"></div>
        </div>
        
        <div class="result-box" id="resultBox">
            <div class="raw-text">
                <p class="result-label">Captured (raw)</p>
                <p class="result-text" id="rawResult"></p>
            </div>
            <div class="english-text">
                <p class="result-label" id="sourceLabel">Detected input</p>
                <p class="result-text" id="englishResult"></p>
            </div>
            <div class="zulu-text">
                <p class="result-label" id="targetLabel">Translation (<span id="langLabel">Zulu</span>)</p>
                <p class="result-text" id="zuluResult"></p>
            </div>
            <button id="playBtn" onclick="playAudio()">🔊 Play Translation</button>
        </div>
        
        <div class="text-input-section">
            <h3 id="textInputTitle">Or type in any language</h3>
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Type text here...">
                <button id="translateBtn" onclick="translateText()">Translate</button>
            </div>
        </div>
        
        </div><!-- End Translate Tab -->
        
        <!-- Transcript Tab -->
        <div id="transcriptTab" class="tab-content">
            <div class="transcript-header">
                <h3>📜 Conversation History</h3>
                <div class="transcript-actions">
                    <button id="downloadBtn" onclick="downloadTranscript()" class="download-btn">⬇️ TXT</button>
                    <button id="downloadCsvBtn" onclick="downloadTableCSV()" class="download-btn csv-btn">⬇️ CSV</button>
                    <button id="clearBtn" onclick="clearTranscript()" class="clear-btn">🗑️ Clear</button>
                </div>
            </div>
            <div class="transcript-search-bar">
                <input type="text" id="transcriptSearch" placeholder="🔍 Search translations..." oninput="updateTranscriptDisplay()" />
            </div>
            <div id="transcriptList" class="transcript-list">
                <p class="empty-message">No translations yet. Start translating to see your history!</p>
            </div>
        </div>
        
    </div>
    
    <audio id="audioPlayer" style="display: none;"></audio>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
